<!DOCTYPE html>
<html lang="en-AU" data-jk-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="JayKishan Solutions — Premium digital solutions for Australian businesses. Elegant, high-converting websites. Built to impress. Designed to convert."
    />
    <title>JayKishan Solutions | Premium Web Design &amp; Development</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      This is a Vite + React app. The full site is rendered into #root by src/main.tsx.
      Do not open this file directly in the browser (file://) — the script will not run.
      From the project folder run: npm install && npm run dev
      Then open the URL shown in the terminal (usually http://localhost:5173).
    -->
    <div id="root">
      <div
        class="jk-boot"
        style="
          min-height: 100vh;
          margin: 0;
          background: #ffffff;
          color: #0a1f44;
          font-family: Inter, system-ui, sans-serif;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 0.75rem;
          padding: 2rem;
          text-align: center;
        "
      >
        <p style="margin: 0; font-weight: 600">Loading JayKishan Solutions…</p>
        <p style="margin: 0; opacity: 0.72; font-size: 0.9rem; max-width: 36rem">
          If this screen does not change, you are not running the dev server. In Terminal, go to this project folder,
          run <code style="background: rgba(10, 31, 68, 0.08); padding: 0.15rem 0.4rem; border-radius: 6px">npm run dev</code>, then open the localhost link Vite prints. Do not open
          <code style="background: rgba(10, 31, 68, 0.08); padding: 0.15rem 0.4rem; border-radius: 6px">index.html</code> directly as a file.
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <div
        style="
          min-height: 100vh;
          background: #ffffff;
          color: #0a1f44;
          font-family: Inter, system-ui, sans-serif;
          padding: 2rem;
          text-align: center;
        "
      >
        <p style="font-weight: 600">JavaScript is required</p>
        <p style="opacity: 0.85">Enable JavaScript to view this site.</p>
      </div>
    </noscript>
  </body>
</html>
