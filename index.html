    <style>
      .jk-boot {
        min-height: 100vh;
        margin: 0;
        background: #ffffff;
        color: #0a1f44;
        font-family: Inter, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: clamp(1.25rem, 4vw, 2.5rem);
        text-align: center;
      }
      .jk-boot__card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(0.75rem, 2.5vw, 1.25rem);
        max-width: 22rem;
        width: 100%;
      }
      .jk-boot__lottie-wrap {
        width: min(16rem, 52vw);
        max-width: 100%;
        aspect-ratio: 1;
        flex-shrink: 0;
      }
      .jk-boot__lottie-wrap canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .jk-boot__logo {
        width: min(11rem, 72vw);
        height: auto;
        object-fit: contain;
      }
    </style>

  <body>
    <!--
      This is a Vite + React app. The full site is rendered into #root by src/main.tsx.
      Do not open this file directly in the browser (file://) — the script will not run.
      From the project folder run: npm install && npm run dev
      Then open the URL shown in the terminal (usually http://localhost:5173).
    -->
    <div id="root">
      <div class="jk-boot">
        <div class="jk-boot__card">
          <div class="jk-boot__lottie-wrap">
            <canvas id="jk-boot-dotlottie" aria-hidden="true"></canvas>
